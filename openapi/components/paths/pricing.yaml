/pricing/plans:
  get:
    tags:
      - Pricing
    summary: Get all available subscription plans
    description: Returns all visible subscription plans with pricing, features, and limits. Public endpoint - no authentication required.
    operationId: getPricingPlans
    responses:
      '200':
        description: List of subscription plans
        content:
          application/json:
            schema:
              type: object
              properties:
                plans:
                  type: array
                  items:
                    $ref: '../schemas/PricingPlan.yaml'
                metadata:
                  type: object
                  properties:
                    currency:
                      type: string
                      example: USD
                    currency_symbol:
                      type: string
                      example: $
                    billing_interval:
                      type: string
                      example: annual
            example:
              plans:
                - id: free
                  name: Free
                  description: Free forever for your first location
                  price_monthly: null
                  price_annual: 0
                  limits:
                    properties: 1
                    devices: 2
                    content: 5
                  features:
                    rooms: false
                    analytics: false
                  display:
                    popular: false
                    recommended: false
                    visible: true
                - id: pro
                  name: Pro
                  description: Up to 5 locations with unlimited TVs per location
                  price_monthly: null
                  price_annual: 29.00
                  limits:
                    properties: 5
                    devices: -1
                    content: 100
                  features:
                    rooms: true
                    analytics: true
                  display:
                    popular: true
                    recommended: true
                    visible: true
              metadata:
                currency: USD
                currency_symbol: $

/pricing/plans/{id}:
  get:
    tags:
      - Pricing
    summary: Get a specific subscription plan
    description: Returns details for a single subscription plan by ID. Public endpoint - no authentication required.
    operationId: getPricingPlan
    parameters:
      - name: id
        in: path
        required: true
        description: Plan ID (e.g., free, pro)
        schema:
          type: string
          enum: [free, pro]
    responses:
      '200':
        description: Plan details
        content:
          application/json:
            schema:
              $ref: '../schemas/PricingPlan.yaml'
            example:
              id: pro
              name: Pro
              description: Up to 5 locations with unlimited TVs per location
              tagline: Everything you need as you grow
              price_monthly: null
              price_annual: 29.00
              trial_days: 0
              limits:
                properties: 5
                devices: -1
                content: 100
                recommendations: 100
              features:
                basic_welcome_screen: true
                wifi_info_display: true
                rooms: true
                analytics: true
                integrations: true
                content_scheduling: true
                api_access: false
                white_label: false
              display:
                popular: true
                recommended: true
                visible: true
                sort_order: 2
      '404':
        $ref: '../responses/common.yaml#/NotFound'

/pricing/compare:
  get:
    tags:
      - Pricing
    summary: Get feature comparison matrix
    description: Returns a comparison matrix of all plans and their features. Useful for building pricing comparison tables. Public endpoint - no authentication required.
    operationId: getPricingComparison
    responses:
      '200':
        description: Feature comparison matrix
        content:
          application/json:
            schema:
              type: object
              properties:
                plans:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      price_monthly:
                        type: number
                        nullable: true
                      price_annual:
                        type: number
                        nullable: true
                      popular:
                        type: boolean
                      recommended:
                        type: boolean
                features:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Human-readable feature name
                      values:
                        type: object
                        description: Feature availability by plan ID
                        additionalProperties:
                          type: boolean
            example:
              plans:
                - id: free
                  name: Free
                  price_annual: 0
                  popular: false
                  recommended: false
                - id: pro
                  name: Pro
                  price_annual: 29.00
                  popular: true
                  recommended: true
              features:
                - name: Multi-Room Support
                  values:
                    free: false
                    pro: true
                - name: Analytics Dashboard
                  values:
                    free: false
                    pro: true

/pricing/payment-config:
  get:
    tags:
      - Pricing
    summary: Get payment provider browser configuration
    description: Returns the Stripe publishable key used to initialize Stripe Elements in the browser. Sourced from the backend environment so the frontend never hardcodes keys. Public endpoint - no authentication required.
    operationId: getPaymentConfig
    responses:
      '200':
        description: Payment configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                publishable_key:
                  type: string
                  nullable: true
                  description: Stripe publishable key (pk_live_... or pk_test_...); null if not configured
                  example: pk_live_xxxxxxxxxxxxxxxxx
