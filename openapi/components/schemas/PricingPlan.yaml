type: object
properties:
  id:
    type: string
    description: Unique plan identifier
    example: pro
    enum: [free, pro]
  name:
    type: string
    description: Plan display name
    example: Pro
  description:
    type: string
    description: Plan description
    example: Up to 5 locations with unlimited TVs per location
  tagline:
    type: string
    description: Marketing tagline
    example: Everything you need as you grow
  price_monthly:
    type: number
    nullable: true
    description: Monthly price in USD (null - all paid plans are billed annually)
    example: null
  price_annual:
    type: number
    nullable: true
    description: Annual price in USD
    example: 29.00
  trial_days:
    type: integer
    description: Number of trial days included
    example: 0
  limits:
    type: object
    description: Resource limits for this plan
    properties:
      properties:
        type: integer
        description: Maximum number of properties (-1 = unlimited)
        example: 5
      devices:
        type: integer
        description: Maximum number of devices per property (-1 = unlimited)
        example: -1
      content:
        type: integer
        description: Maximum number of content items (-1 = unlimited)
        example: 100
      recommendations:
        type: integer
        description: Maximum number of recommendations per category (-1 = unlimited)
        example: 100
  features:
    type: object
    description: Feature availability flags
    properties:
      basic_welcome_screen:
        type: boolean
        example: true
      wifi_info_display:
        type: boolean
        example: true
      rooms:
        type: boolean
        description: Multi-room support for hotels
        example: true
      analytics:
        type: boolean
        description: Analytics dashboard access
        example: true
      integrations:
        type: boolean
        description: PMS integrations enabled
        example: true
      content_scheduling:
        type: boolean
        description: Time-based content scheduling
        example: true
      api_access:
        type: boolean
        description: REST API access for third parties
        example: false
      white_label:
        type: boolean
        description: Remove WelcomeSign branding
        example: false
      priority_support:
        type: boolean
        description: Priority support queue
        example: true
  display:
    type: object
    description: Display metadata for frontend
    properties:
      popular:
        type: boolean
        description: Mark as "Most Popular"
        example: true
      recommended:
        type: boolean
        description: Mark as "Recommended"
        example: true
      visible:
        type: boolean
        description: Whether plan is visible in listings
        example: true
      sort_order:
        type: integer
        description: Display order (lower = first)
        example: 2
      badge:
        type: string
        nullable: true
        description: Optional badge text (e.g., "Limited Time")
        example: null
      badge_color:
        type: string
        nullable: true
        description: Badge color (e.g., "gold", "red")
        example: null
